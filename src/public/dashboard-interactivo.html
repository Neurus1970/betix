<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Betix - Dashboard Interactivo</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0b0c0f;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px 16px 40px;
    }

    header {
      text-align: center;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #f8fafc;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: 4px;
    }

    /* ── Controls ──────────────────────────────────────────────────────── */
    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-bottom: 24px;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .filter-group label {
      font-size: 0.75rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    select {
      background: #131518;
      color: #e2e8f0;
      border: 1px solid #1e2228;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.9rem;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
      min-width: 200px;
    }

    select:hover, select:focus { border-color: #7ee8a2; }

    /* ── Charts layout ────────────────────────────────────────────────── */
    .charts-container {
      display: flex;
      gap: 20px;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      align-items: flex-start;
    }

    .chart-box {
      flex: 1;
      background: #131518;
      border: 1px solid #1e2228;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
    }

    .chart-box h2 {
      font-size: 0.85rem;
      font-weight: 600;
      color: #94a3b8;
      padding: 14px 18px 10px;
      border-bottom: 1px solid #1e2228;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ── Map ───────────────────────────────────────────────────────────── */
    #map-svg { width: 100%; display: block; }

    .province {
      stroke: #0b0c0f;
      stroke-width: 0.5;
      transition: fill 0.35s ease, opacity 0.3s ease;
      cursor: pointer;
    }

    .province:hover { stroke: #7ee8a2; stroke-width: 1.5; }
    .province.highlighted { stroke: #7ee8a2; stroke-width: 2; }
    .province.dimmed { opacity: 0.2; }

    /* ── Pie ───────────────────────────────────────────────────────────── */
    #pie-svg { width: 100%; display: block; }

    .pie-title {
      font-size: 0.78rem;
      text-align: center;
      color: #7ee8a2;
      padding: 6px 18px 2px;
      font-style: italic;
      min-height: 24px;
    }

    .pie-legend {
      padding: 4px 18px 16px;
    }

    .pie-legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      color: #94a3b8;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .pie-legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Tooltip ───────────────────────────────────────────────────────── */
    #tooltip {
      position: fixed;
      background: #0b0c0f;
      border: 1px solid #7ee8a2;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.82rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 200;
      line-height: 1.7;
      max-width: 220px;
    }

    #tooltip strong { color: #7ee8a2; display: block; margin-bottom: 2px; }

    /* ── Loader ────────────────────────────────────────────────────────── */
    .loader {
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      inset: 0;
      background: #131518;
      border-radius: 16px;
      z-index: 10;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #1e2228;
      border-top-color: #7ee8a2;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      h1 { font-size: 1.3rem; }
      .charts-container { flex-direction: column; }
      .controls { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Dashboard Interactivo</h1>
    <p class="subtitle">Betix · Análisis por provincia y juego — hover en el mapa para ver detalle</p>
  </header>

  <div class="controls">
    <div class="filter-group">
      <label for="sel-juego">Juego</label>
      <select id="sel-juego">
        <option value="Todos">Todos los juegos</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="sel-metrica">Métrica</label>
      <select id="sel-metrica">
        <option value="cantidad">Cantidad de apuestas</option>
        <option value="importe">Importe total ($)</option>
        <option value="beneficio">Beneficio neto ($)</option>
      </select>
    </div>
  </div>

  <div class="charts-container">
    <!-- MAP -->
    <div class="chart-box" id="map-box">
      <h2>Mapa por provincia</h2>
      <div class="loader" id="map-loader"><div class="spinner"></div></div>
      <svg id="map-svg"></svg>
    </div>

    <!-- PIE -->
    <div class="chart-box" id="pie-box">
      <h2>Distribución</h2>
      <p class="pie-title" id="pie-title">Todas las provincias</p>
      <svg id="pie-svg"></svg>
      <div class="pie-legend" id="pie-legend"></div>
    </div>
  </div>

  <div id="tooltip"></div>

  <script>
    const GEO_URL = '/argentina.geojson';
    const API_URL = '/api/datos/geodata';

    const METRIC_LABELS = {
      cantidad:  'Cantidad',
      importe:   'Importe ($)',
      beneficio: 'Beneficio ($)',
    };

    const PIE_COLORS = [
      '#7ee8a2', '#3b82f6', '#f59e0b', '#ef4444',
      '#a855f7', '#06b6d4', '#ec4899', '#84cc16',
      '#f97316', '#14b8a6',
    ];

    const fmt = (metrica, v) =>
      metrica === 'cantidad'
        ? (v || 0).toLocaleString('es-AR')
        : '$' + (v || 0).toLocaleString('es-AR');

    // ── State ──────────────────────────────────────────────────────────────
    let rawData = [];
    let geoData = null;
    let hoveredProvince = null;
    let pinnedProvince = null;
    let explodedIdx    = null;

    const tooltip   = document.getElementById('tooltip');
    const selJuego  = document.getElementById('sel-juego');
    const selMetrica = document.getElementById('sel-metrica');

    const getJuego   = () => selJuego.value;
    const getMetrica = () => selMetrica.value;

    // ── Tooltip ────────────────────────────────────────────────────────────
    function showTooltip(html, event) {
      tooltip.innerHTML = html;
      tooltip.style.opacity = '1';
      tooltip.style.left = (event.clientX + 16) + 'px';
      tooltip.style.top  = (event.clientY - 10) + 'px';
    }
    function moveTooltip(event) {
      tooltip.style.left = (event.clientX + 16) + 'px';
      tooltip.style.top  = (event.clientY - 10) + 'px';
    }
    function hideTooltip() { tooltip.style.opacity = '0'; }

    // ── Aggregation ────────────────────────────────────────────────────────
    function aggregateByProvince(juego, metrica) {
      const filtered = juego === 'Todos' ? rawData : rawData.filter(d => d.juego === juego);
      const map = {};
      for (const d of filtered) {
        map[d.provincia] = (map[d.provincia] || 0) + (d[metrica] || 0);
      }
      return map;
    }

    function getProvinceGames(provincia, metrica) {
      const juego = getJuego();
      const items = rawData.filter(d =>
        d.provincia === provincia && (juego === 'Todos' || d.juego === juego)
      );
      return items
        .map(d => ({ label: d.juego, value: d[metrica] || 0 }))
        .filter(d => d.value > 0)
        .sort((a, b) => b.value - a.value);
    }

    // ── Map ────────────────────────────────────────────────────────────────
    const mapSvg = d3.select('#map-svg');

    function renderMap() {
      const juego   = getJuego();
      const metrica = getMetrica();
      const values  = aggregateByProvince(juego, metrica);

      const allVals  = Object.values(values);
      const maxVal   = allVals.length ? d3.max(allVals) : 1;

      const colorScale = d3.scaleSequential()
        .domain([0, maxVal])
        .interpolator(d3.interpolate('#1a2535', '#7ee8a2'));

      const box = document.getElementById('map-box');
      const w   = box.clientWidth || 520;
      const h   = w * 1.3;

      mapSvg
        .attr('viewBox', `0 0 ${w} ${h}`)
        .attr('preserveAspectRatio', 'xMidYMid meet');

      mapSvg.selectAll('g').remove();
      const g = mapSvg.append('g');

      const projection = d3.geoMercator()
        .center([-65, -38])
        .scale(w * 1.4)
        .translate([w / 2, h / 2]);

      const pathGen = d3.geoPath().projection(projection);

      g.selectAll('.province')
        .data(geoData.features)
        .join('path')
        .attr('class', d => {
          let cls = 'province';
          const name = d.properties.NAME_1;
          if (pinnedProvince && name !== pinnedProvince) cls += ' dimmed';
          if (name === hoveredProvince) cls += ' highlighted';
          return cls;
        })
        .attr('d', pathGen)
        .attr('fill', d => {
          const val = values[d.properties.NAME_1];
          return val != null ? colorScale(val) : '#1a2535';
        })
        .on('mouseenter', function(event, d) {
          const name = d.properties.NAME_1;
          hoveredProvince = name;
          d3.select(this).classed('highlighted', true);
          renderPie();
          const val = values[name];
          showTooltip(
            val != null
              ? `<strong>${name}</strong>${METRIC_LABELS[metrica]}: ${fmt(metrica, val)}`
              : `<strong>${name}</strong><span style="color:#64748b">Sin datos</span>`,
            event
          );
        })
        .on('mousemove', moveTooltip)
        .on('mouseleave', function() {
          hoveredProvince = null;
          d3.select(this).classed('highlighted', false);
          renderPie();
          hideTooltip();
        });
    }

    // ── Pie ────────────────────────────────────────────────────────────────
    const pieSvg   = d3.select('#pie-svg');
    const pieTitle = document.getElementById('pie-title');
    const pieLeg   = document.getElementById('pie-legend');

    function renderPie() {
      const metrica = getMetrica();
      const juego   = getJuego();

      let pieData;
      let titleText;

      if (hoveredProvince) {
        pieData   = getProvinceGames(hoveredProvince, metrica);
        titleText = hoveredProvince;
      } else {
        const values = aggregateByProvince(juego, metrica);
        pieData = Object.entries(values)
          .map(([label, value]) => ({ label, value }))
          .filter(d => d.value > 0)
          .sort((a, b) => b.value - a.value);
        titleText = juego === 'Todos' ? 'Todas las provincias' : juego;
      }

      pieTitle.textContent = titleText;

      const box    = document.getElementById('pie-box');
      const w      = box.clientWidth || 480;
      const h      = Math.min(w * 0.75, 340);
      const radius = Math.min(w, h) / 2 - 24;
      const cx     = w / 2;
      const cy     = h / 2;

      pieSvg
        .attr('viewBox', `0 0 ${w} ${h}`)
        .attr('preserveAspectRatio', 'xMidYMid meet');

      pieSvg.selectAll('*').remove();

      if (!pieData.length) {
        pieSvg.append('text')
          .attr('x', w / 2).attr('y', h / 2)
          .attr('text-anchor', 'middle')
          .attr('fill', '#64748b')
          .attr('font-size', '0.88rem')
          .text('No hay datos para esta combinación');
        pieLeg.innerHTML = '';
        return;
      }

      const colorMap = {};
      pieData.forEach((d, i) => { colorMap[d.label] = PIE_COLORS[i % PIE_COLORS.length]; });

      const pie     = d3.pie().value(d => d.value).sort(null);
      const arc     = d3.arc().innerRadius(radius * 0.38).outerRadius(radius);
      const arcBig  = d3.arc().innerRadius(radius * 0.38).outerRadius(radius + 14);

      const g = pieSvg.append('g').attr('transform', `translate(${cx},${cy})`);
      const total = pieData.reduce((s, d) => s + d.value, 0);

      g.selectAll('.arc')
        .data(pie(pieData))
        .join('g')
        .attr('class', 'arc')
        .each(function(d, i) {
          const arcNode = d3.select(this);

          // Explode offset if this slice is pinned
          let tx = 0, ty = 0;
          if (i === explodedIdx && !hoveredProvince) {
            const mid = (d.startAngle + d.endAngle) / 2;
            const off = 14;
            tx = Math.cos(mid - Math.PI / 2) * off;
            ty = Math.sin(mid - Math.PI / 2) * off;
          }

          arcNode.append('path')
            .attr('d', arc)
            .attr('fill', colorMap[d.data.label])
            .attr('stroke', '#0b0c0f')
            .attr('stroke-width', 1.5)
            .attr('transform', `translate(${tx},${ty})`)
            .on('mouseenter', function(event) {
              d3.select(this)
                .transition().duration(180)
                .attr('d', arcBig);
              const pct = total > 0 ? ((d.data.value / total) * 100).toFixed(1) : 0;
              showTooltip(
                `<strong>${d.data.label}</strong>${METRIC_LABELS[metrica]}: ${fmt(metrica, d.data.value)}<br/><span style="color:#94a3b8">${pct}% del total</span>`,
                event
              );
            })
            .on('mousemove', moveTooltip)
            .on('mouseleave', function() {
              d3.select(this).transition().duration(180).attr('d', arc);
              hideTooltip();
            })
            .on('click', function() {
              // Only act when pie shows provinces (no province hovered)
              if (hoveredProvince) return;
              if (pinnedProvince === d.data.label && explodedIdx === i) {
                pinnedProvince = null;
                explodedIdx    = null;
              } else {
                pinnedProvince = d.data.label;
                explodedIdx    = i;
              }
              renderMap();
              renderPie();
            });
        });

      // Legend
      pieLeg.innerHTML = '';
      pieData.forEach(d => {
        const pct  = total > 0 ? ((d.value / total) * 100).toFixed(1) : 0;
        const item = document.createElement('div');
        item.className = 'pie-legend-item';
        item.title = `${d.label}: ${fmt(metrica, d.value)} (${pct}%)`;
        item.innerHTML = `
          <div class="pie-legend-dot" style="background:${colorMap[d.label]}"></div>
          <span>${d.label}: ${fmt(metrica, d.value)} (${pct}%)</span>
        `;
        pieLeg.appendChild(item);
      });
    }

    // ── Load data ──────────────────────────────────────────────────────────
    async function loadData() {
      try {
        const [geoRes, apiRes] = await Promise.all([
          fetch(GEO_URL),
          fetch(API_URL),
        ]);
        if (!geoRes.ok || !apiRes.ok) throw new Error('Error en la respuesta del servidor');

        geoData = await geoRes.json();
        const apiJson = await apiRes.json();

        rawData = apiJson.data.provinces.flatMap(p =>
          p.games.map(g => ({ provincia: p.provincia, ...g }))
        );

        // Populate game dropdown dynamically from actual data
        const games = [...new Set(rawData.map(d => d.juego))].sort();
        games.forEach(game => {
          const opt = document.createElement('option');
          opt.value = game;
          opt.textContent = game;
          selJuego.appendChild(opt);
        });

        document.getElementById('map-loader').style.display = 'none';
        renderMap();
        renderPie();
      } catch (err) {
        const loader = document.getElementById('map-loader');
        loader.innerHTML = '<span style="color:#ef4444;font-size:0.88rem">⚠ Error al cargar los datos</span>';
        console.error(err);
      }
    }

    // ── Event listeners ────────────────────────────────────────────────────
    selJuego.addEventListener('change', () => {
      pinnedProvince = null;
      explodedIdx    = null;
      hoveredProvince = null;
      renderMap();
      renderPie();
    });

    selMetrica.addEventListener('change', () => {
      renderMap();
      renderPie();
    });

    window.addEventListener('resize', () => {
      if (rawData.length) { renderMap(); renderPie(); }
    });

    loadData();
  </script>
</body>
</html>
