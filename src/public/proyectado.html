<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Betix · Proyecciones</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    /* ── Design tokens (Solarized Dark) ───────────────────────────────────── */
    :root {
      --bg:            #0d1117;
      --surface:       #161b22;
      --surface-hover: #1c2128;
      --border:        #21262d;
      --text:          #c9d1d9;
      --muted:         #8b949e;
      --accent:        #56d364;
      --accent-blue:   #388bfd;
      --accent-orange: #e3b341;
      --accent-red:    #f85149;
      --accent-purple: #a371f7;
      --accent-cyan:   #39d4d8;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px 16px 48px;
    }

    /* ── Header ───────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .brand { display: flex; align-items: center; gap: 10px; }

    .brand-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent-purple);
      box-shadow: 0 0 8px var(--accent-purple);
    }

    h1 { font-size: 1.4rem; font-weight: 700; color: #f0f6fc; }

    /* ── Nav links ────────────────────────────────────────────────────────── */
    nav { display: flex; gap: 8px; flex-wrap: wrap; }

    nav a {
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      text-decoration: none;
      font-size: 0.82rem;
      transition: all .15s;
    }

    nav a:hover { background: var(--surface-hover); color: var(--text); }
    nav a.active { border-color: var(--accent-purple); color: var(--accent-purple); }

    /* ── Filters ──────────────────────────────────────────────────────────── */
    .filters {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: flex-end;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px 18px;
      margin-bottom: 20px;
    }

    .filter-group { display: flex; flex-direction: column; gap: 4px; }

    .filter-group label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    select {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 10px;
      font-size: 0.85rem;
      cursor: pointer;
      min-width: 140px;
    }

    select:focus { outline: none; border-color: var(--accent-purple); }

    /* ── Chart card ───────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 14px;
    }

    #chart-svg {
      width: 100%;
      display: block;
    }

    /* ── Legend ───────────────────────────────────────────────────────────── */
    .legend {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .legend-line {
      width: 24px;
      height: 2px;
      border-radius: 2px;
    }

    .legend-line.solid    { background: var(--accent-blue); }
    .legend-line.dashed   { background: repeating-linear-gradient(90deg, var(--accent-blue) 0 5px, transparent 5px 9px); }
    .legend-band          { width: 16px; height: 10px; border-radius: 3px; background: rgba(56,139,253,.2); border: 1px solid rgba(56,139,253,.4); }

    /* ── Tooltip ──────────────────────────────────────────────────────────── */
    #tooltip {
      position: fixed;
      pointer-events: none;
      background: #1c2128;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 0.8rem;
      line-height: 1.6;
      color: var(--text);
      box-shadow: 0 4px 16px rgba(0,0,0,.4);
      opacity: 0;
      transition: opacity .1s;
      z-index: 999;
      min-width: 160px;
    }

    #tooltip .tip-fecha  { font-weight: 700; color: #f0f6fc; margin-bottom: 4px; }
    #tooltip .tip-valor  { color: var(--accent-blue); }
    #tooltip .tip-error  { color: var(--muted); font-size: 0.75rem; }
    #tooltip .tip-badge  {
      display: inline-block;
      font-size: 0.65rem;
      padding: 1px 6px;
      border-radius: 10px;
      margin-left: 4px;
      vertical-align: middle;
    }
    #tooltip .tip-badge.hist { background: rgba(56,139,253,.2); color: var(--accent-blue); }
    #tooltip .tip-badge.proj { background: rgba(163,113,247,.2); color: var(--accent-purple); }

    /* ── Data table ───────────────────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    thead th {
      text-align: left;
      padding: 8px 12px;
      color: var(--muted);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border);
    }

    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface-hover); }

    tbody td {
      padding: 8px 12px;
      color: var(--text);
    }

    tbody tr.row-proj td { color: var(--accent-purple); }

    .badge-hist, .badge-proj {
      display: inline-block;
      font-size: 0.65rem;
      padding: 1px 6px;
      border-radius: 10px;
    }

    .badge-hist { background: rgba(56,139,253,.15); color: var(--accent-blue); }
    .badge-proj { background: rgba(163,113,247,.15); color: var(--accent-purple); }

    /* ── Axis styles (SVG) ────────────────────────────────────────────────── */
    .axis path, .axis line { stroke: var(--border); }
    .axis text { fill: var(--muted); font-size: 11px; }
    .grid line { stroke: var(--border); stroke-opacity: .5; }
    .grid path { stroke-width: 0; }
  </style>
</head>
<body>

  <header>
    <div class="brand">
      <div class="brand-dot"></div>
      <h1>Betix · Proyecciones</h1>
    </div>
    <nav>
      <a href="/dashboard">Dashboard</a>
      <a href="/proyectado" class="active">Proyecciones</a>
    </nav>
  </header>

  <!-- Filtros -->
  <div class="filters">
    <div class="filter-group">
      <label for="sel-provincia">Provincia</label>
      <select id="sel-provincia"></select>
    </div>
    <div class="filter-group">
      <label for="sel-juego">Juego</label>
      <select id="sel-juego"></select>
    </div>
    <div class="filter-group">
      <label for="sel-meses">Meses a futuro</label>
      <select id="sel-meses">
        <option value="1">1 mes</option>
        <option value="2">2 meses</option>
        <option value="3">3 meses</option>
        <option value="4">4 meses</option>
        <option value="5">5 meses</option>
        <option value="6">6 meses</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="sel-metrica">Métrica</label>
      <select id="sel-metrica">
        <option value="cantidad">Cantidad</option>
        <option value="ingresos">Ingresos</option>
        <option value="beneficio">Beneficio</option>
      </select>
    </div>
  </div>

  <!-- Gráfico -->
  <div class="card">
    <div class="card-title" id="chart-title">Proyección — —</div>
    <svg id="chart-svg" height="380"></svg>
    <div class="legend">
      <div class="legend-item"><div class="legend-line solid"></div><span>Histórico</span></div>
      <div class="legend-item"><div class="legend-line dashed"></div><span>Proyectado</span></div>
      <div class="legend-item"><div class="legend-band"></div><span>Banda de confianza (±SD)</span></div>
    </div>
  </div>

  <!-- Tabla -->
  <div class="card">
    <div class="card-title">Datos numéricos</div>
    <div class="table-wrap">
      <table id="table-proyectado">
        <thead>
          <tr>
            <th>Mes</th>
            <th>Tipo</th>
            <th>Cantidad</th>
            <th>Ingresos</th>
            <th>Costo</th>
            <th>Beneficio</th>
            <th>Error ±</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

  <div id="tooltip"></div>

  <script>
    // ── Selectores DOM ─────────────────────────────────────────────────────
    const selProvincia = document.getElementById('sel-provincia');
    const selJuego     = document.getElementById('sel-juego');
    const selMeses     = document.getElementById('sel-meses');
    const selMetrica   = document.getElementById('sel-metrica');
    const tooltip      = document.getElementById('tooltip');

    // ── Formato de fechas y valores ────────────────────────────────────────
    const MESES_ES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

    function formatFecha(yyyymm) {
      const [y, m] = yyyymm.split('-').map(Number);
      return `${MESES_ES[m - 1]} ${String(y).slice(2)}`;
    }

    function formatValor(v, metrica) {
      if (metrica === 'cantidad') return v.toLocaleString('es-AR');
      return '$' + v.toLocaleString('es-AR');
    }

    // ── Inicialización de selectores ───────────────────────────────────────
    async function init() {
      const res  = await fetch('/api/datos/proyectado');
      const json = await res.json();
      const { provincias, juegos } = json.data;

      provincias.forEach(p => {
        const opt = document.createElement('option');
        opt.value = opt.textContent = p;
        selProvincia.appendChild(opt);
      });

      juegos.forEach(j => {
        const opt = document.createElement('option');
        opt.value = opt.textContent = j;
        selJuego.appendChild(opt);
      });

      await loadData();
    }

    // ── Carga de datos y re-render ─────────────────────────────────────────
    async function loadData() {
      const p = encodeURIComponent(selProvincia.value);
      const j = encodeURIComponent(selJuego.value);
      const m = selMeses.value;
      const res  = await fetch(`/api/datos/proyectado?provincia=${p}&juego=${j}&meses=${m}`);
      const json = await res.json();
      renderChart(json.data);
      renderTable(json.data);
    }

    [selProvincia, selJuego, selMeses, selMetrica].forEach(el =>
      el.addEventListener('change', loadData)
    );

    // ── Gráfico D3.js ──────────────────────────────────────────────────────
    function renderChart({ historico, proyectado, provincia, juego }) {
      const metrica = selMetrica.value;

      document.getElementById('chart-title').textContent =
        `Proyección · ${provincia} · ${juego} · ${selMetrica.options[selMetrica.selectedIndex].text}`;

      const svgEl = document.getElementById('chart-svg');
      const svg   = d3.select('#chart-svg');
      svg.selectAll('*').remove();

      const margin = { top: 24, right: 32, bottom: 64, left: 78 };
      const W = svgEl.clientWidth - margin.left - margin.right;
      const H = 380 - margin.top - margin.bottom;

      const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

      // Datos combinados
      const allData  = [...historico, ...proyectado];
      const allDates = allData.map(d => d.fecha);
      const lastHistFecha = historico[historico.length - 1].fecha;

      // Escalas
      const x = d3.scalePoint().domain(allDates).range([0, W]).padding(0.1);

      const yMax = d3.max(allData, d => {
        const err = d[`error_${metrica}`] || 0;
        return d[metrica] + err;
      }) * 1.08;

      const y = d3.scaleLinear().domain([0, yMax]).range([H, 0]);

      // Grid horizontal
      g.append('g')
        .attr('class', 'grid')
        .call(d3.axisLeft(y).tickSize(-W).tickFormat(''))
        .select('.domain').remove();

      // Banda de confianza (área proyectada)
      if (proyectado.length > 0) {
        const areaData = [
          { fecha: lastHistFecha, [metrica]: historico[historico.length - 1][metrica], [`error_${metrica}`]: 0 },
          ...proyectado,
        ];

        const area = d3.area()
          .x(d => x(d.fecha))
          .y0(d => y(Math.max(0, d[metrica] - (d[`error_${metrica}`] || 0))))
          .y1(d => y(d[metrica] + (d[`error_${metrica}`] || 0)));

        g.append('path')
          .datum(areaData)
          .attr('fill', 'rgba(56,139,253,.12)')
          .attr('stroke', 'rgba(56,139,253,.25)')
          .attr('stroke-width', 1)
          .attr('d', area);
      }

      // Generador de línea
      const line = d3.line()
        .x(d => x(d.fecha))
        .y(d => y(d[metrica]));

      // Línea histórica (sólida)
      g.append('path')
        .datum(historico)
        .attr('fill', 'none')
        .attr('stroke', '#388bfd')
        .attr('stroke-width', 2.5)
        .attr('d', line);

      // Puente al primer punto proyectado (sólido→punteado)
      if (proyectado.length > 0) {
        g.append('path')
          .datum([historico[historico.length - 1], proyectado[0]])
          .attr('fill', 'none')
          .attr('stroke', '#388bfd')
          .attr('stroke-width', 2)
          .attr('stroke-dasharray', '6,4')
          .attr('d', line);

        // Línea proyectada (punteada)
        g.append('path')
          .datum(proyectado)
          .attr('fill', 'none')
          .attr('stroke', '#a371f7')
          .attr('stroke-width', 2)
          .attr('stroke-dasharray', '6,4')
          .attr('d', line);
      }

      // Línea separadora histórico/proyectado
      if (proyectado.length > 0) {
        const xSep = x(lastHistFecha);
        g.append('line')
          .attr('x1', xSep).attr('x2', xSep)
          .attr('y1', 0).attr('y2', H)
          .attr('stroke', '#8b949e')
          .attr('stroke-width', 1)
          .attr('stroke-dasharray', '4,4');

        g.append('text')
          .attr('x', xSep + 4).attr('y', 10)
          .attr('fill', '#8b949e')
          .attr('font-size', '10px')
          .text('proyección →');
      }

      // Puntos interactivos
      function addDots(data, isProj) {
        g.selectAll(`.dot-${isProj ? 'proj' : 'hist'}`)
          .data(data)
          .join('circle')
          .attr('class', `dot-${isProj ? 'proj' : 'hist'}`)
          .attr('cx', d => x(d.fecha))
          .attr('cy', d => y(d[metrica]))
          .attr('r', 4)
          .attr('fill', isProj ? '#a371f7' : '#388bfd')
          .attr('stroke', 'var(--bg)')
          .attr('stroke-width', 2)
          .attr('cursor', 'pointer')
          .on('mousemove', (event, d) => showTooltip(event, d, isProj))
          .on('mouseleave', hideTooltip);
      }

      addDots(historico, false);
      if (proyectado.length > 0) addDots(proyectado, true);

      // Ejes
      const xAxis = g.append('g')
        .attr('class', 'axis')
        .attr('transform', `translate(0,${H})`)
        .call(d3.axisBottom(x).tickFormat(formatFecha));

      xAxis.selectAll('text')
        .attr('transform', 'rotate(-40)')
        .style('text-anchor', 'end')
        .attr('dx', '-0.4em')
        .attr('dy', '0.6em');

      g.append('g')
        .attr('class', 'axis')
        .call(d3.axisLeft(y).ticks(6).tickFormat(v => formatValor(v, metrica)));

      // Etiqueta eje Y
      g.append('text')
        .attr('transform', 'rotate(-90)')
        .attr('x', -H / 2).attr('y', -64)
        .attr('text-anchor', 'middle')
        .attr('fill', '#8b949e')
        .attr('font-size', '11px')
        .text(selMetrica.options[selMetrica.selectedIndex].text);
    }

    // ── Tooltip ────────────────────────────────────────────────────────────
    function showTooltip(event, d, isProj) {
      const metrica = selMetrica.value;
      const err     = d[`error_${metrica}`];
      const badge   = isProj
        ? '<span class="tip-badge proj">proyectado</span>'
        : '<span class="tip-badge hist">histórico</span>';

      tooltip.innerHTML = `
        <div class="tip-fecha">${formatFecha(d.fecha)} ${badge}</div>
        <div class="tip-valor">${selMetrica.options[selMetrica.selectedIndex].text}: <strong>${formatValor(d[metrica], metrica)}</strong></div>
        ${isProj && err !== undefined ? `<div class="tip-error">± ${formatValor(err, metrica)}</div>` : ''}
        <div style="color:var(--muted);font-size:.75rem;margin-top:4px">
          Cant.: ${d.cantidad?.toLocaleString('es-AR') ?? '—'} &nbsp;|&nbsp;
          Benef.: ${d.beneficio !== undefined ? '$' + d.beneficio.toLocaleString('es-AR') : '—'}
        </div>
      `;
      tooltip.style.opacity = '1';
      moveTooltip(event);
    }

    function moveTooltip(event) {
      const x = event.clientX + 14;
      const y = event.clientY - 10;
      tooltip.style.left = `${Math.min(x, window.innerWidth - 200)}px`;
      tooltip.style.top  = `${y}px`;
    }

    function hideTooltip() {
      tooltip.style.opacity = '0';
    }

    // ── Tabla ──────────────────────────────────────────────────────────────
    function renderTable({ historico, proyectado }) {
      const metrica = selMetrica.value;
      const tbody   = document.getElementById('table-body');
      tbody.innerHTML = '';

      const fmt  = (v, m) => v !== undefined ? formatValor(v, m) : '—';
      const fmtE = (d, isProj) => isProj && d[`error_${metrica}`] !== undefined
        ? `± ${formatValor(d[`error_${metrica}`], metrica)}`
        : '—';

      [...historico, ...proyectado].forEach((d, i) => {
        const isProj = i >= historico.length;
        const tr = document.createElement('tr');
        if (isProj) tr.classList.add('row-proj');
        tr.innerHTML = `
          <td>${formatFecha(d.fecha)}</td>
          <td>${isProj ? '<span class="badge-proj">Proyectado</span>' : '<span class="badge-hist">Histórico</span>'}</td>
          <td>${fmt(d.cantidad, 'cantidad')}</td>
          <td>${fmt(d.ingresos, 'ingresos')}</td>
          <td>${fmt(d.costo, 'ingresos')}</td>
          <td>${fmt(d.beneficio, 'beneficio')}</td>
          <td>${fmtE(d, isProj)}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    // ── Redimensionado ─────────────────────────────────────────────────────
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(loadData, 200);
    });

    init();
  </script>
</body>
</html>
