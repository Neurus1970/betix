<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Betix - Mapa de Ingresos por Provincia</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0b0c0f;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px 16px 40px;
    }

    header {
      text-align: center;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #f8fafc;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #64748b;
      margin-top: 4px;
    }

    .nav-link {
      display: inline-block;
      margin-top: 10px;
      font-size: 0.8rem;
      color: #7ee8a2;
      text-decoration: none;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .nav-link:hover { opacity: 1; }

    /* ── Controls ─────────────────────────────────────────────────────── */
    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-bottom: 24px;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .filter-group label {
      font-size: 0.75rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    select {
      background: #131518;
      color: #e2e8f0;
      border: 1px solid #1e2228;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.9rem;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
      min-width: 180px;
    }
    select:hover, select:focus { border-color: #7ee8a2; }

    /* ── Map container ────────────────────────────────────────────────── */
    .map-wrapper {
      max-width: 900px;
      margin: 0 auto;
    }

    .chart-box {
      background: #131518;
      border: 1px solid #1e2228;
      border-radius: 12px;
      padding: 20px;
    }

    .chart-box h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 16px;
      text-align: center;
    }

    #map-svg {
      width: 100%;
      display: block;
    }

    .province {
      fill: #1e2228;
      stroke: #2d3748;
      stroke-width: 0.8;
      transition: fill 0.2s;
    }

    .bubble {
      fill-opacity: 0.75;
      stroke-width: 1.5;
      cursor: pointer;
      transition: fill-opacity 0.2s, r 0.3s ease;
    }
    .bubble:hover { fill-opacity: 1; }

    /* ── Legend ───────────────────────────────────────────────────────── */
    .legend {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      color: #94a3b8;
    }

    .legend-bubble {
      border-radius: 50%;
      background: #7ee8a2;
      opacity: 0.75;
      flex-shrink: 0;
    }

    /* ── Tooltip ──────────────────────────────────────────────────────── */
    .tooltip {
      position: fixed;
      background: #1e2228;
      border: 1px solid #7ee8a2;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.82rem;
      color: #e2e8f0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      max-width: 220px;
      z-index: 100;
    }

    .tooltip strong {
      display: block;
      color: #7ee8a2;
      margin-bottom: 4px;
      font-size: 0.9rem;
    }

    .tooltip .tip-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 2px 0;
      color: #94a3b8;
    }

    .tooltip .tip-val {
      color: #e2e8f0;
      font-weight: 600;
    }

    /* ── Loading / Error ──────────────────────────────────────────────── */
    .status-msg {
      text-align: center;
      padding: 60px 0;
      color: #64748b;
      font-size: 0.95rem;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>Mapa de Ingresos y Ventas por Provincia</h1>
  <p class="subtitle">Distribución geográfica de actividad de apuestas — Tecno Acción</p>
  <a href="/dashboard-interactivo" class="nav-link">← Volver al Dashboard</a>
</header>

<div class="controls">
  <div class="filter-group">
    <label>Juego</label>
    <select id="sel-juego"><option value="">Todos los juegos</option></select>
  </div>
  <div class="filter-group">
    <label>Desde</label>
    <select id="sel-desde"></select>
  </div>
  <div class="filter-group">
    <label>Hasta</label>
    <select id="sel-hasta"></select>
  </div>
  <div class="filter-group">
    <label>Métrica</label>
    <select id="sel-metrica">
      <option value="ingresos">Ingresos</option>
      <option value="beneficio">Beneficio</option>
      <option value="cantidad">Volumen (cantidad)</option>
    </select>
  </div>
</div>

<div class="map-wrapper">
  <div class="chart-box">
    <h2 id="chart-title">Ingresos totales por provincia</h2>
    <div id="map-container"><p class="status-msg">Cargando datos…</p></div>
  </div>
  <div class="legend" id="bubble-legend"></div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
'use strict';

/* ── State ─────────────────────────────────────────────────────────── */
let allData   = null;
let geoData   = null;

const METRIC_LABELS = {
  ingresos:  'Ingresos',
  beneficio: 'Beneficio',
  cantidad:  'Volumen',
};

const fmt = {
  ingresos:  v => `$${d3.format(',.0f')(v)}`,
  beneficio: v => `$${d3.format(',.0f')(v)}`,
  cantidad:  v => d3.format(',.0f')(v) + ' tickets',
};

/* ── Tooltip ───────────────────────────────────────────────────────── */
const tooltip = document.getElementById('tooltip');

function showTooltip(html, event) {
  tooltip.innerHTML = html;
  tooltip.style.opacity = '1';
  moveTooltip(event);
}
function moveTooltip(event) {
  const x = event.clientX + 14;
  const y = event.clientY - 10;
  tooltip.style.left = `${Math.min(x, window.innerWidth - 240)}px`;
  tooltip.style.top  = `${y}px`;
}
function hideTooltip() { tooltip.style.opacity = '0'; }

/* ── Data fetch ────────────────────────────────────────────────────── */
async function fetchData() {
  const juego      = document.getElementById('sel-juego').value;
  const fechaDesde = document.getElementById('sel-desde').value;
  const fechaHasta = document.getElementById('sel-hasta').value;

  const params = new URLSearchParams();
  if (juego)      params.append('juego',       juego);
  if (fechaDesde) params.append('fecha_desde', fechaDesde);
  if (fechaHasta) params.append('fecha_hasta', fechaHasta);

  const qs  = params.toString();
  const url = `/api/datos/mapa-burbujas${qs ? `?${qs}` : ''}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

/* ── Populate filter dropdowns ─────────────────────────────────────── */
function populateFilters(juegos, fechas) {
  const selJuego = document.getElementById('sel-juego');
  juegos.forEach(j => {
    const o = document.createElement('option');
    o.value = j; o.textContent = j;
    selJuego.appendChild(o);
  });

  const selDesde = document.getElementById('sel-desde');
  const selHasta = document.getElementById('sel-hasta');

  const allOpt = document.createElement('option');
  allOpt.value = ''; allOpt.textContent = 'Todo el histórico';
  selDesde.appendChild(allOpt.cloneNode(true));
  selHasta.appendChild(allOpt.cloneNode(true));

  fechas.forEach(f => {
    const o = document.createElement('option');
    o.value = f; o.textContent = f;
    selDesde.appendChild(o.cloneNode(true));
    selHasta.appendChild(o.cloneNode(true));
  });

  // Default: hasta = last date
  selHasta.value = fechas[fechas.length - 1] || '';
}

/* ── Render ────────────────────────────────────────────────────────── */
function render(provinces, metrica) {
  const container = document.getElementById('map-container');
  container.innerHTML = '';

  const W = container.clientWidth || 860;
  const H = Math.round(W * 1.15);

  const svg = d3.select(container)
    .append('svg')
    .attr('id', 'map-svg')
    .attr('viewBox', `0 0 ${W} ${H}`)
    .attr('preserveAspectRatio', 'xMidYMid meet');

  /* ── Projection ── */
  const projection = d3.geoMercator()
    .center([-65, -38])
    .scale(W * 1.55)
    .translate([W / 2, H / 2]);

  const path = d3.geoPath().projection(projection);

  /* ── Province polygons ── */
  if (geoData) {
    svg.append('g')
      .selectAll('path')
      .data(geoData.features)
      .join('path')
      .attr('class', 'province')
      .attr('d', path);
  }

  if (!provinces || provinces.length === 0) {
    svg.append('text')
      .attr('x', W / 2).attr('y', H / 2)
      .attr('text-anchor', 'middle')
      .attr('fill', '#64748b')
      .text('Sin datos para los filtros seleccionados');
    return;
  }

  /* ── Bubble scale ── */
  const values   = provinces.map(p => p[metrica]);
  const maxVal   = d3.max(values) || 1;
  const rScale   = d3.scaleSqrt().domain([0, maxVal]).range([6, W * 0.065]);
  const colorScale = d3.scaleSequential()
    .domain([0, maxVal])
    .interpolator(d3.interpolate('#2d4a35', '#7ee8a2'));

  /* ── Bubbles ── */
  const bubbles = svg.append('g')
    .selectAll('circle')
    .data(provinces)
    .join('circle')
    .attr('class', 'bubble')
    .attr('cx', d => projection([d.lng, d.lat])[0])
    .attr('cy', d => projection([d.lng, d.lat])[1])
    .attr('r',  d => rScale(d[metrica]))
    .attr('fill',   d => colorScale(d[metrica]))
    .attr('stroke', d => colorScale(d[metrica]));

  bubbles
    .on('mousemove', (event, d) => {
      showTooltip(`
        <strong>${d.provincia}</strong>
        <div class="tip-row"><span>Ingresos</span><span class="tip-val">$${d3.format(',.0f')(d.ingresos)}</span></div>
        <div class="tip-row"><span>Beneficio</span><span class="tip-val">$${d3.format(',.0f')(d.beneficio)}</span></div>
        <div class="tip-row"><span>Cantidad</span><span class="tip-val">${d3.format(',.0f')(d.cantidad)}</span></div>
      `, event);
    })
    .on('mouseleave', hideTooltip);

  /* ── Province labels ── */
  svg.append('g')
    .selectAll('text')
    .data(provinces)
    .join('text')
    .attr('x', d => projection([d.lng, d.lat])[0])
    .attr('y', d => projection([d.lng, d.lat])[1] + rScale(d[metrica]) + 12)
    .attr('text-anchor', 'middle')
    .attr('font-size', '9px')
    .attr('fill', '#94a3b8')
    .attr('pointer-events', 'none')
    .text(d => d.provincia.split(' ')[0]);

  /* ── Legend ── */
  updateLegend(rScale, metrica, maxVal);
}

function updateLegend(rScale, metrica, maxVal) {
  const legend = document.getElementById('bubble-legend');
  legend.innerHTML = '';

  const refValues = [maxVal * 0.25, maxVal * 0.6, maxVal].filter(v => v > 0);
  refValues.forEach(v => {
    const r = Math.round(rScale(v));
    const size = r * 2;
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `
      <div class="legend-bubble" style="width:${size}px;height:${size}px"></div>
      <span>${fmt[metrica](Math.round(v))}</span>
    `;
    legend.appendChild(item);
  });
}

/* ── Chart title ───────────────────────────────────────────────────── */
function updateTitle(metrica) {
  const juego = document.getElementById('sel-juego').value;
  const label = METRIC_LABELS[metrica];
  document.getElementById('chart-title').textContent =
    `${label} ${juego ? `(${juego})` : 'totales'} por provincia`;
}

/* ── Main ──────────────────────────────────────────────────────────── */
async function init() {
  try {
    const json = await fetchData();
    allData = json.data;

    populateFilters(allData.juegos, allData.fechas);

    const metrica = document.getElementById('sel-metrica').value;
    updateTitle(metrica);
    render(allData.provinces, metrica);
  } catch (e) {
    document.getElementById('map-container').innerHTML =
      `<p class="status-msg">Error al cargar datos: ${e.message}</p>`;
  }
}

async function refresh() {
  const container = document.getElementById('map-container');
  container.innerHTML = '<p class="status-msg">Actualizando…</p>';
  try {
    const json = await fetchData();
    const metrica = document.getElementById('sel-metrica').value;
    updateTitle(metrica);
    render(json.data.provinces, metrica);
  } catch (e) {
    container.innerHTML = `<p class="status-msg">Error: ${e.message}</p>`;
  }
}

/* ── GeoJSON ───────────────────────────────────────────────────────── */
fetch('/argentina.geojson')
  .then(r => r.json())
  .then(geo => { geoData = geo; })
  .catch(() => { /* optional base map */ })
  .finally(() => init());

/* ── Filter listeners ──────────────────────────────────────────────── */
['sel-juego', 'sel-desde', 'sel-hasta'].forEach(id =>
  document.getElementById(id).addEventListener('change', refresh)
);

document.getElementById('sel-metrica').addEventListener('change', () => {
  const metrica = document.getElementById('sel-metrica').value;
  updateTitle(metrica);
  // Re-render from last fetched data without re-fetching
  refresh();
});
</script>
</body>
</html>
