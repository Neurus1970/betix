server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index dashboard.html;

    # Static assets
    location ~* \.(html|css|js|json|geojson|ico|png|svg)$ {
        try_files $uri =404;
    }

    # SPA-style page routes
    location /dashboard {
        try_files /dashboard.html =404;
    }

    location /dashboard-interactivo {
        try_files /dashboard-interactivo.html =404;
    }

    location /proyectado {
        try_files /proyectado.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
