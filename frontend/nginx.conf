server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index dashboard.html;

    # Proxy API calls to Node.js API service
    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /healthz {
        proxy_pass http://api:3000;
    }

    # Static assets
    location ~* \.(html|css|js|json|geojson|ico|png|svg)$ {
        try_files $uri =404;
    }

    # SPA-style page routes
    location /dashboard {
        try_files /dashboard.html =404;
    }

    location /backoffice {
        try_files /backoffice.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
