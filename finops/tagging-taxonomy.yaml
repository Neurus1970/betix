# finops/tagging-taxonomy.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Taxonomía de tagging FinOps — fuente única de verdad para Betix / Tecno Acción
# Generado por: scripts/init-repo.sh --finops-* flags
# Consumido por: terraform/ (yamldecode) + .github/workflows/ (yq)
# Referencia: FinOps Foundation — Cost Allocation capability
#
# Para regenerar este archivo:
#   ./scripts/init-repo.sh --finops-product betix --finops-owner platform-team \
#     --finops-cost-center CC-001 --finops-email finops@tecnoaccion.com \
#     --finops-budget-monthly-dev 200 --finops-budget-monthly-uat 500 \
#     --finops-budget-monthly-prod 2000
# ─────────────────────────────────────────────────────────────────────────────
version: "1.0"

required_tags:
  - key: product
    description: "Nombre del producto"
    value: betix
  - key: environment
    description: "Entorno de despliegue"
    allowed_values: [dev, uat, prod]
    value: null  # set by var.environment at apply time
  - key: owner
    description: "Equipo o persona responsable del recurso"
    value: platform-team
  - key: cost-center
    description: "Código de centro de costo financiero"
    value: CC-001
  - key: created-by
    description: "Herramienta que creó el recurso"
    allowed_values: [terraform, github-actions]
    value: terraform

budgets:
  dev:
    annual_usd:   2400
    monthly_usd:  200   # annual / 12
    quarterly_usd: 600  # annual / 4
  uat:
    annual_usd:   6000
    monthly_usd:  500   # annual / 12
    quarterly_usd: 1500 # annual / 4
  prod:
    annual_usd:   24000
    monthly_usd:  2000  # annual / 12
    quarterly_usd: 6000 # annual / 4

alerts:
  thresholds: [70, 80, 90]
  channels:
    email: finops@tecnoaccion.com
    # slack_webhook: configure via GitHub Secret FINOPS_SLACK_WEBHOOK
