services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       betix
      POSTGRES_USER:     betix
      POSTGRES_PASSWORD: betix
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U betix -d betix"]
      interval: 5s
      timeout: 3s
      retries: 10

  db-seed:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./db:/db
    environment:
      BETIX_DB_URL: postgresql://betix:betix@db:5432/betix
    entrypoint: ["/bin/sh", "/db/load_data.sh"]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  core:
    build:
      context: .
      dockerfile: core/Dockerfile
    image: betix-core:latest
    ports:
      - "5001:5000"
    environment:
      CORE_PORT:    "5000"
      BETIX_DB_URL: postgresql://betix:betix@db:5432/betix
    depends_on:
      db:
        condition: service_healthy
      db-seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/healthz')"]
      interval: 60s
      start_interval: 5s
      timeout: 5s
      retries: 3

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: betix-api:latest
    ports:
      - "3000:3000"
    environment:
      NODE_ENV:   production
      BETIX_PORT: "3000"
      CORE_URL:   "http://core:5000"
      REDIS_URL:  "redis://redis:6379"
      CACHE_TTL:  "60"
    depends_on:
      core:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: betix-frontend:latest
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  db_data:
