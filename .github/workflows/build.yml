name: Build

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias Node.js
        run: npm ci

      - name: Instalar dependencias Python
        run: pip install -r core/requirements.txt

      - name: Ejecutar tests Node.js con cobertura
        run: npm run test:ci

      - name: Ejecutar tests Python con cobertura
        run: python3 -m pytest core/tests/ --cov=core --cov-report=xml:coverage-core.xml

      - name: Leer versión del API
        id: version
        run: echo "value=$(cat src/VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=Neurus1970_betix
            -Dsonar.organization=neurus1970
            -Dsonar.projectName=BETIX
            -Dsonar.projectVersion=${{ steps.version.outputs.value }}
            -Dsonar.sources=src,core,terraform
            -Dsonar.tests=tests,features
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.python.coverage.reportPaths=coverage-core.xml
            -Dsonar.exclusions=node_modules/**,coverage/**,test-results/**,core/tests/**,**/__pycache__/**,**/*.pyc
            -Dsonar.coverage.exclusions=src/app.js,terraform/**
