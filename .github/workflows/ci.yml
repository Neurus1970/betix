name: CI - Lint & Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-core:
    name: Python Core Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias Python
        run: pip install -r core/requirements.txt

      - name: Ejecutar tests Python con cobertura
        run: python3 -m pytest core/tests/ --cov=core --cov-report=xml:coverage-core.xml --cov-report=term-missing

      - name: Publicar cobertura Python
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-core
          path: coverage-core.xml

  lint-and-test:
    name: Lint & Test (Node.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar lint
        run: npm run lint

      - name: Ejecutar tests con cobertura
        run: npm run test:ci

      - name: Ejecutar tests funcionales (Cucumber)
        run: npm run test:functional:ci
        continue-on-error: false

      - name: Publicar resultados de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results/junit.xml
            test-results/cucumber.xml

      - name: Publicar reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

