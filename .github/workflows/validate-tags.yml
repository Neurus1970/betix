name: Validate FinOps tags

# NOTE: Este workflow usa `terraform validate` en lugar de `terraform plan` porque
# el repo es un playground educativo sin credenciales AWS reales configuradas.
# En un proyecto real con OIDC o secrets configurados, usar `terraform plan`.

on:
  pull_request:
    paths:
      - 'terraform/**'
      - 'finops/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  validate-tags:
    runs-on: ubuntu-latest
    name: Validate mandatory FinOps tags

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.6"
          terraform_wrapper: false

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Validate FinOps tags
        run: |
          echo "Verificando estructura de finops/tagging-taxonomy.yaml..."
          TAG_COUNT=$(yq '.required_tags | length' finops/tagging-taxonomy.yaml)
          echo "Tags requeridos definidos: $TAG_COUNT"
          [ "$TAG_COUNT" -lt 5 ] && echo "ERROR: Se esperan al menos 5 tags requeridos" && exit 1

          for env in dev uat prod; do
            ANNUAL=$(yq ".budgets.${env}.annual_usd" finops/tagging-taxonomy.yaml)
            echo "Budget $env: $ANNUAL USD/año"
            [ "$ANNUAL" = "null" ] && echo "ERROR: Budget para $env no definido" && exit 1
          done
          echo "OK: tagging-taxonomy.yaml válido"
