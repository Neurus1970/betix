apiVersion: apps/v1
kind: Deployment
metadata:
  name: core
  namespace: betix
  labels:
    app: core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: core
  template:
    metadata:
      labels:
        app: core
    spec:
      containers:
        - name: core
          image: betix-core:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: CORE_PORT
              value: "5000"
            - name: BETIX_DB_URL
              valueFrom:
                secretKeyRef:
                  name: betix-db-secret
                  key: url
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 3
            periodSeconds: 5
