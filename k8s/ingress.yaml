apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: betix-ingress
  namespace: betix
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: betix.local
      http:
        paths:
          # API endpoints
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 3000
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: api
                port:
                  number: 3000
          # Static frontend pages
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
