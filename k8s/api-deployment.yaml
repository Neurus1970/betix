apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: betix
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: betix-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: BETIX_PORT
              value: "3000"
            - name: CORE_URL
              value: "http://core:5000"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: CACHE_TTL
              value: "60"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
